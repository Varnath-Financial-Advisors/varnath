name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://rowjmwhevrmlyfewljum.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvd2ptd2hldnJtbHlmZXdsanVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjIzODMsImV4cCI6MjA4NDczODM4M30.YzHxdYt3zLo3WIGL6Neqo6Xf82cNHY7SvJA53zjHoHY
          VITE_SUPABASE_PROJECT_ID: rowjmwhevrmlyfewljum
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
